services:
  postgres:
    image: postgres:17
    container_name: livedocs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: livedocs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgressql/data

volumes:
  postgres_data:
